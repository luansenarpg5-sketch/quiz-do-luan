<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz PRO do Luan 🔥</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #111, #1a1a1a);
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  background: #222;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 0 20px rgba(255,102,0,0.6);
}

button {
  margin: 6px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #ff6600;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  background: #ff8533;
}
</style>
</head>

<body>

<div class="box" id="tela">
  <h2>Escolha o nível</h2>
  <button onclick="iniciar('facil')">Fácil</button>
  <button onclick="iniciar('medio')">Médio</button>
  <button onclick="iniciar('dificil')">Difícil</button>

  <h3 id="contador"></h3>
</div>

<audio id="acerto" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="erro" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

// contador simples (local)
let visitas = localStorage.getItem("visitas") || 0;
visitas++;
localStorage.setItem("visitas", visitas);
document.getElementById("contador").innerText = "👥 Jogadores: " + visitas;

// banco de perguntas
const banco = {

facil: [
{p:"2+2?", r:["3","4","5","6"], c:1},
{p:"Cor do céu?", r:["Azul","Verde","Rosa","Preto"], c:0},
{p:"5x2?", r:["10","12","8","6"], c:0},
{p:"Animal que late?", r:["Gato","Cachorro","Peixe","Pássaro"], c:1},
{p:"Dia depois de segunda?", r:["Terça","Quarta","Domingo","Sexta"], c:0}
],

medio: [
{p:"Capital do Japão?", r:["Seul","Tóquio","Pequim","Bangkok"], c:1},
{p:"15x3?", r:["30","45","60","50"], c:1},
{p:"Maior planeta?", r:["Terra","Marte","Júpiter","Vênus"], c:2},
{p:"Raiz de 64?", r:["6","7","8","9"], c:2},
{p:"HTML é?", r:["Linguagem web","Jogo","App","Banco"], c:0}
],

dificil: [
{p:"Criador do JS?", r:["Bill Gates","Brendan Eich","Elon Musk","Jobs"], c:1},
{p:"Ano 1ª guerra?", r:["1914","1939","1900","1920"], c:0},
{p:"π?", r:["3.14","2.17","4.20","3.50"], c:0},
{p:"Capital da Noruega?", r:["Oslo","Paris","Roma","Madrid"], c:0},
{p:"CSS serve pra?", r:["Estilo","Banco","Servidor","Jogo"], c:0}
]

};

let perguntas = [];
let i = 0;
let pontos = 0;

function iniciar(nivel){
  perguntas = banco[nivel];
  i = 0;
  pontos = 0;
  mostrar();
}

function mostrar(){
  let q = perguntas[i];

  document.getElementById("tela").innerHTML = `
    <h2>${q.p}</h2>
    <div id="respostas"></div>
    <p>${i+1}/${perguntas.length}</p>
  `;

  let div = document.getElementById("respostas");

  q.r.forEach((resp, index)=>{
    let btn = document.createElement("button");
    btn.innerText = resp;
    btn.onclick = ()=>verificar(index);
    div.appendChild(btn);
  });
}

function verificar(resp){
  if(resp === perguntas[i].c){
    pontos++;
    document.getElementById("acerto").play();
  } else {
    document.getElementById("erro").play();
  }

  i++;

  if(i < perguntas.length){
    mostrar();
  } else {
    fim();
  }
}

function fim(){
  let nome = prompt("Seu nome:");
  let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

  ranking.push({nome, pontos});
  ranking.sort((a,b)=>b.pontos-a.pontos);

  localStorage.setItem("ranking", JSON.stringify(ranking));

  document.getElementById("tela").innerHTML = `
    <h2>Fim de jogo</h2>
    <p>Pontos: ${pontos}</p>
    <button onclick="location.reload()">Jogar novamente</button>
    <h3>🏆 Ranking</h3>
    <ul>
      ${ranking.map(r=>`<li>${r.nome} - ${r.pontos}</li>`).join("")}
    </ul>
  `;
}

</script>

</body>
</html>
